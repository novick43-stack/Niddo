<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Niddo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple: #7C3AED;
            --purple-light: #8B5CF6;
            --teal: #10B981;
            --bg: #0d0d12;
            --surface: #16161f;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f5;
            --muted: #8b8b9e;
        }

        :root.light {
            --bg: #f5f5fa;
            --surface: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #111118;
            --muted: #6b6b80;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s;
            position: relative;
        }

        /* Glow */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            z-index: 10;
        }

        .theme-toggle:hover {
            color: var(--text);
            border-color: rgba(124,58,237,0.4);
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        .logo {
            display: block;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple-light), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        /* Role buttons */
        .role-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .role-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .role-btn:hover {
            border-color: var(--purple-light);
            background: rgba(124, 58, 237, 0.07);
            transform: translateY(-1px);
        }

        .role-btn.admin:hover { border-color: var(--purple-light); }
        .role-btn.vecino:hover { border-color: var(--teal); background: rgba(16,185,129,0.07); }

        .role-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .role-icon.admin { background: rgba(124,58,237,0.12); }
        .role-icon.vecino { background: rgba(16,185,129,0.12); }

        .role-info { flex: 1; }
        .role-name { font-weight: 700; margin-bottom: 0.1rem; }
        .role-desc { font-size: 0.78rem; color: var(--muted); font-weight: 400; }

        .role-arrow { color: var(--muted); font-size: 0.85rem; }

        /* Login form */
        .login-form { display: none; }
        .login-form.active {
            display: block;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 1rem; }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.3s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--purple-light);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
        }

        input::placeholder { color: var(--muted); }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        .btn-submit.admin { background: var(--purple); }
        .btn-submit.admin:hover { background: var(--purple-light); box-shadow: 0 8px 20px rgba(124,58,237,0.3); }
        .btn-submit.vecino { background: var(--teal); }
        .btn-submit.vecino:hover { background: #059669; box-shadow: 0 8px 20px rgba(16,185,129,0.3); }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 1rem;
            padding: 0;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--text); }

        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #f87171;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .divider {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .divider a {
            color: var(--purple-light);
            text-decoration: none;
        }

        .divider a:hover { text-decoration: underline; }

        .form-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .form-role-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .form-role-icon.admin { background: rgba(124,58,237,0.12); }
        .form-role-icon.vecino { background: rgba(16,185,129,0.12); }

        .form-title {
            font-size: 1.1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">🌙</button>

    <div class="card">
        <a href="/" class="logo">Niddo</a>

        <!-- Role selection → redirect a Auth0 -->
        <div id="role-selection">
            <h2>¿Cómo querés ingresar?</h2>
            <div class="role-options">
                <a class="role-btn admin" id="btn-admin" href="/auth/login?role=admin">
                    <div class="role-icon admin">🏢</div>
                    <div class="role-info">
                        <div class="role-name">Administrador</div>
                        <div class="role-desc">Gestión de expensas, finanzas y consorcio</div>
                    </div>
                    <span class="role-arrow">›</span>
                </a>
                <a class="role-btn vecino" id="btn-vecino" href="/auth/login?role=vecino">
                    <div class="role-icon vecino">🏠</div>
                    <div class="role-info">
                        <div class="role-name">Vecino</div>
                        <div class="role-desc">Pagos, reclamos y amenities</div>
                    </div>
                    <span class="role-arrow">›</span>
                </a>
            </div>
        </div>

        <div class="divider">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // ——— Theme ———
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;

        function applyTheme(t) {
            root.classList.toggle('light', t === 'light');
            toggle.textContent = t === 'light' ? '☀️' : '🌙';
        }

        applyTheme(localStorage.getItem('theme') || 'dark');

        toggle.addEventListener('click', () => {
            const next = root.classList.contains('light') ? 'dark' : 'light';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });
    </script>
</body>
</html>
